<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones Forzosas en la Seguridad Vial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #e6edf3;
            --accent-glow: rgba(0, 242, 254, 0.15);
            --card-border: rgba(255, 255, 255, 0.1);
            --modal-bg: rgba(13, 17, 23, 0.85);
            --neon-blue: #00f2fe;
            --neon-purple: #4facfe;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center; /* Centrado horizontal */
            align-items: center; /* Centrado vertical */
            padding: 60px 20px 40px 20px; 
            overflow-x: hidden;
            position: relative;
        }

        /* Instrucción Flotante en la zona superior derecha */
        .instruction {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 0.9rem;
            font-weight: 300;
            color: #8b949e;
            background: rgba(13, 17, 23, 0.7);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 900;
            animation: pulse 2s infinite alternate;
        }

        .instruction::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        /* Contenedor principal centrado en pantalla */
        .container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Grid de Tarjetas Cuadradas */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            width: 100%;
        }

        /* Estructura de la Tarjeta y Fuente */
        .card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra la tarjeta y su fuente */
            width: 100%;
        }

        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; 
            border-radius: 16px; 
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--card-border);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.5s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Fondos de imagen sin textos superpuestos */
        .card-conductores { background-image: url('conductores.png'); }
        .card-ciclistas { background-image: url('ciclistas.png'); }
        .card-peatones { background-image: url('peatones.png'); }

        /* Efectos Hover de la Tarjeta Estilo Futurista */
        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--neon-blue);
            box-shadow: 0 15px 35px rgba(0, 242, 254, 0.2), 0 0 15px var(--accent-glow);
        }

        /* Iluminación gradual interna al hacer hover */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 242, 254, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover::after {
            opacity: 1;
        }

        /* Estilo para las Fuentes CENTRADAS debajo de cada tarjeta */
        .card-source {
            font-size: 0.75rem;
            color: #57606a;
            margin-top: 15px;
            font-style: italic;
            text-align: center; 
            transition: color 0.3s ease;
            max-width: 90%;
        }

        .card:hover + .card-source {
            color: var(--neon-blue);
        }

        /* Ventana Emergente (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 14, 20, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            background: var(--modal-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 600px;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 242, 254, 0.1);
            transform: scale(0.8) translateY(30px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            text-align: left; /* Alineación del contenido del modal a la izquierda */
        }

        .modal-overlay.active .modal-container {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--neon-blue);
            color: #0d1117;
            box-shadow: 0 0 15px var(--neon-blue);
            transform: rotate(90deg);
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ffffff, #8b949e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-text {
            font-size: 1rem;
            line-height: 1.7;
            color: #c9d1d9;
            font-weight: 300;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Responsividad */
        @media (max-width: 900px) {
            .grid-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding-top: 80px; 
                align-items: flex-start; 
            }
            .grid-cards {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .modal-container { padding: 25px; }
            .modal-title { font-size: 1.6rem; }
            .instruction {
                position: absolute;
                top: 15px;
                right: 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="instruction">Haga clic sobre las tarjetas para ampliar la información.</div>

    <div class="container">
        
        <div class="grid-cards">
            
            <div class="card-wrapper">
                <div class="card card-conductores" onclick="openModal('conductores')"></div>
                <div class="card-source">Fuente: (Nano Erdozain, 2021, en Pexels).</div>
            </div>

            <div class="card-wrapper">
                <div class="card card-ciclistas" onclick="openModal('ciclistas')"></div>
                <div class="card-source">Fuente: (Munbaik Cycling Clothing, 2020, en Pexels).</div>
            </div>

            <div class="card-wrapper">
                <div class="card card-peatones" onclick="openModal('peatones')"></div>
                <div class="card-source">Fuente: (Talha Kozan, 2022, en Pexels).</div>
            </div>

        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-container" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 class="modal-title" id="modalTitle">Título</h2>
            <p class="modal-text" id="modalText">Contenido...</p>
        </div>
    </div>

    <script>
        const data = {
            conductores: {
                title: "Conductores",
                text: "Las funciones forzosas aplicadas a los conductores incluyen señales de velocidad máxima colocadas estratégicamente, advertencias en curvas peligrosas y barreras de protección que limitan la trayectoria en zonas críticas. Siguiendo el marco propuesto por Norman (2013), estas medidas operan como restricciones físicas y simbólicas que guían el comportamiento del usuario hacia la opción más segura sin depender exclusivamente de su atención consciente o su toma de decisiones voluntaria.<br><br>Esto es especialmente relevante en el contexto vial, donde las condiciones cambiantes del entorno (baja visibilidad, fatiga o alta carga cognitiva) pueden comprometer la capacidad del conductor para detectar y responder a los factores de riesgo. Las barreras físicas en tramos con alta incidencia de accidentes, por ejemplo, actúan como guías que obligan a mantener trayectorias seguras precisamente en los momentos en que la atención selectiva del conductor es más vulnerable."
            },
            ciclistas: {
                title: "Ciclistas",
                text: "Para los ciclistas, las funciones forzosas incluyen carriles exclusivos para bicicletas y pasos peatonales elevados, que separan físicamente a los ciclistas del tráfico motorizado. Estas medidas no solo crean rutas seguras, sino que también reducen las interacciones peligrosas, promoviendo un flujo ordenado y predecible.<br><br>Estas infraestructuras ayudan a evitar accidentes causados por cruces erráticos o comportamientos impredecibles, al tiempo que refuerzan la visibilidad y seguridad de los ciclistas en entornos urbanos y rurales (F. H. A., 2009)."
            },
            peatones: {
                title: "Peatones",
                text: "Los peatones también se benefician de las funciones forzosas, como pasos peatonales elevados, semáforos exclusivos y barreras físicas que los dirigen hacia rutas seguras y reducen el riesgo de atropellos. Estas medidas organizan el flujo peatonal en áreas convalidadas, asegurando que las interacciones con los vehículos ocurran en puntos controlados y reduciendo la exposición a zonas de alto riesgo.<br><br>Además, el diseño de barreras o vallas en ciertas áreas evita que los peatones crucen en lugares no permitidos, aumentando significativamente su seguridad (Pérez, 2020)."
            }
        };

        const overlay = document.getElementById('modalOverlay');
        const mTitle = document.getElementById('modalTitle');
        const mText = document.getElementById('modalText');

        function openModal(key) {
            mTitle.textContent = data[key].title;
            mText.innerHTML = data[key].text;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && overlay.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
