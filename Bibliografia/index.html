<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliografía - Señalización Vial y Factor Humano</title>
    <!-- Importación de Inter para la estructura y Poppins para las tarjetas -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-base: #27728F; 
            --accent-bright: #4ce3ff; 
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(39, 114, 143, 0.3);
            --text-main: #ffffff;
            --text-dim: #cce9f5;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: #030a0d;
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; cursor: default;
        }

        #custom-cursor-tool {
            position: fixed; pointer-events: none;
            background: var(--accent-bright); color: #000;
            padding: 5px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700;
            z-index: 9999; display: none;
            transform: translate(15px, 15px);
            box-shadow: 0 0 15px var(--accent-bright);
        }

        .fluid-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #05131a; filter: blur(80px);
        }
        .fluid-layer { position: absolute; border-radius: 50%; opacity: 0.35; animation: fluidMove infinite alternate ease-in-out; }
        .layer-1 { background: radial-gradient(circle, var(--accent-base) 0%, transparent 70%); width: 100vw; height: 100vw; top: -30%; left: -10%; animation-duration: 20s; }
        .layer-2 { background: radial-gradient(circle, #0e303d 0%, transparent 70%); width: 80vw; height: 80vw; bottom: -20%; right: -10%; animation-duration: 25s; }
        @keyframes fluidMove { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10%, 5%) scale(1.1); } }

        .nav-instruction {
            width: 90vw; max-width: 1400px;
            background: rgba(39, 114, 143, 0.15);
            border: 1px dashed var(--accent-bright);
            padding: 15px; border-radius: 12px;
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem; color: var(--accent-bright);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .main-header { text-align: center; padding: 30px 20px; z-index: 1; }
        .main-header h1 { font-weight: 300; font-size: 2rem; letter-spacing: 6px; text-transform: uppercase; margin: 0; background: linear-gradient(to right, #fff, var(--text-dim)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-header .line { width: 60px; height: 3px; background: var(--accent-bright); margin: 15px auto; }

        .reference-grid {
            display: grid; width: 90vw; max-width: 1400px;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; padding-bottom: 80px; z-index: 1;
        }

        /* Aplicación de la fuente Poppins específica para las tarjetas */
        .card {
            font-family: 'Poppins', sans-serif;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 25px;
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
            min-height: 190px;
        }
        .card:hover { border-color: var(--accent-bright); transform: translateY(-5px); background: rgba(39, 114, 143, 0.08); box-shadow: 0 10px 20px rgba(39, 114, 143, 0.15); }

        .author-tag { font-size: 0.75rem; font-weight: 600; color: var(--accent-bright); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
        .title { font-size: 0.9rem; font-weight: 400; line-height: 1.6; color: var(--text-main); margin-bottom: 15px; }

        .footer-info {
            font-size: 0.75rem; font-weight: 300; color: var(--text-dim);
            border-top: 1px solid rgba(39, 114, 143, 0.2);
            padding-top: 15px; margin-top: auto;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-visit { font-family: 'Poppins', sans-serif; text-decoration: none; background: var(--accent-bright); color: #000; padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; transition: background 0.2s; }
        .btn-visit:hover { background: #fff; }
        .btn-copy { font-family: 'Poppins', sans-serif; background: transparent; border: 1px solid var(--accent-bright); color: var(--accent-bright); padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .btn-copy:hover { background: var(--accent-bright); color: #000; }
        
    </style>
</head>
<body>

    <div id="custom-cursor-tool">¡Enlace Copiado!</div>

    <div class="fluid-background">
        <div class="fluid-layer layer-1"></div>
        <div class="fluid-layer layer-2"></div>
    </div>

    <div class="nav-instruction">
        🛑 <b>Instrucción de Navegación:</b> Revisa las investigaciones y manuales técnicos de infraestructura vial. Haz clic en <b>Visitar</b> para acceder a los portales oficiales o en <b>Copiar Link</b> para almacenar el enlace técnico en tu portapapeles.
    </div>

    <header class="main-header">
        <h1>Señalización y Factor Humano</h1>
        <div class="line"></div>
    </header>

    <main class="reference-grid" id="grid"></main>

    <script>
        const sources = [
            { a: "Álvarez, G. A., & López, A. J. (2014)", t: "Evaluación de señalización en zonas escolares: Caso Bogotá", f: "Bogotá: Universidad Nacional de Colombia", u: null },
            { a: "ANSV. (2024)", t: "Manual de Señalización Vial de Colombia", f: "Agencia Nacional de Seguridad Vial", u: "https://ansv.gov.co/es/publicaciones/manual-de-senalizacion-vial" },
            { a: "Elvik, R. (2009)", t: "The Handbook of Road Safety Measures (2nd ed.)", f: "Emerald Group Publishing", u: null },
            { a: "ETSC. (2022)", t: "Dynamic Road Signs and Traffic Safety: A European Overview", f: "Brussels: European Transport Safety Council", u: null },
            { a: "F. H. A. (2009)", t: "Manual on Uniform Traffic Control Devices: Standards for Traffic Signs and Signals", f: "Washington D. C.: Federal Highway Administration", u: null },
            { a: "Fuller, R. (2005)", t: "Towards a general theory of driver behavior", f: "Accident Analysis & Prevention, 37(3), 461-472", u: null },
            { a: "García, J., Pérez, L., & Martínez, A. (2020)", t: "Estudio sobre percepción y efectividad de señales viales reflectantes y luminosas", f: "Revista de Ingeniería Vial, 15(3), 45-56", u: null },
            { a: "Gibson, J. J. (1979)", t: "The Ecological Approach to Visual Perception", f: "Houghton Mifflin", u: null },
            { a: "Hoel, L., & Garber, N. (2019)", t: "Traffic and Highway Engineering (6th ed.)", f: "Cengage Learning", u: null },
            { a: "ITF. (2015)", t: "Road infrastructure safety management", f: "International Transport Forum (ITF)", u: "https://www.itf-oecd.org/road-infrastructure-safety-management" },
            { a: "Mintransporte. (2015)", t: "Manual de Señalización Vial: Normativa y aplicación", f: "Bogotá: Ministerio de Transporte de Colombia", u: null },
            { a: "Neisser, U. (1967)", t: "Cognitive Psychology", f: "Appleton-Century-Crofts", u: null },
            { a: "Norman, D. A. (2013)", t: "The Design of Everyday Things", f: "Basic Books", u: null },
            { a: "Norza, C. E., & otros. (2014)", t: "Componentes descriptivos y explicativos de la accidentalidad vial en Colombia: incidencia del factor humano", f: "Revista Criminalidad, 56(1), 157-187", u: null },
            { a: "OCDE. (2017)", t: "Asset Management for Sustainable Road Infrastructure: A Guide", f: "Paris: OECD Publishing", u: null },
            { a: "OCDE. (2019)", t: "Real-Time Road Safety: The Role of Dynamic Signs", f: "Paris: OECD Publishing", u: null },
            { a: "OMS. (2023)", t: "Global status report on road safety 2023", f: "Organización Mundial de la Salud", u: "https://www.who.int/teams/social-determinants-of-health/safety-and-mobility/global-status-report-on-road-safety-2023" },
            { a: "Pérez, M. (2020)", t: "Diseño inclusivo en infraestructura vial: una revisión de estrategias adaptadas a usuarios vulnerables", f: "Revista de Diseño y Urbanismo, 12(4), 88-102", u: null },
            { a: "Reason, J. (1990)", t: "Human Error", f: "Cambridge University Press", u: null },
            { a: "Simons, D., & Chabris, C. (1999)", t: "Gorillas in our midst: Sustained inattentional blindness for dynamic events", f: "Perception, 28(9), 1059–1074", u: null },
            { a: "Sweller, J. (1988)", t: "Cognitive load during problem solving: Effects on learning", f: "Cognitive Science, 12(2), 257-285", u: null },
            { a: "Thaler, R., & Sunstein, C. (2008)", t: "Nudge: Improving Decisions About Health, Wealth, and Happiness", f: "Yale University Press", u: null },
            { a: "Wickens, C., Lee, J., & Gordon, S. (2019)", t: "An Introduction to Human Factors Engineering", f: "Pearson Prentice Hall", u: null },
            { a: "Wilde, G. J. (1982)", t: "The theory of risk homeostasis: Implications for safety and health", f: "Risk Analysis, 2(4), 209-225", u: null }
        ];

        const grid = document.getElementById('grid');
        const tool = document.getElementById('custom-cursor-tool');

        document.addEventListener('mousemove', (e) => {
            tool.style.left = e.clientX + 'px';
            tool.style.top = e.clientY + 'px';
        });

        sources.forEach((s) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let html = `
                <div class="author-tag">${s.a}</div>
                <div class="title">${s.t}</div>
                <div class="footer-info">${s.f}</div>
            `;

            if(s.u) {
                html += `
                    <div class="btn-group">
                        <a href="${s.u}" target="_blank" class="btn-visit">Visitar</a>
                        <button class="btn-copy" onclick="copyLink('${s.u}')">Copiar Link</button>
                    </div>
                `;
            }

            card.innerHTML = html;
            grid.appendChild(card);
        });

        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                tool.style.display = 'block';
                setTimeout(() => { tool.style.display = 'none'; }, 1500);
            });
        }
    </script>
</body>
</html>
